<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>ShadeClimb</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>

  <body>
    <h1>ShadeClimb</h1>

    <h2 id="mainTitle">Escuelas de escalada</h2>

    <table id="cragsTable">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Provincia</th>
          <th>Nº vías</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <table id="sectorsTable" style="display: none">
      <thead>
        <tr>
          <th>Sector</th>
          <th>Nº vías</th>
          <th>Min grado</th>
          <th>Max grado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div id="emptyState" style="display: none"></div>

    <h2 id="selectedTitle" style="display: none"></h2>

    <div id="simulationPanel" style="display: none">
      <h3>Simulación solar</h3>

      <div class="simInputs">
        <input type="number" id="day" placeholder="Día" min="1" max="31" />
        <input type="number" id="month" placeholder="Mes" min="1" max="12" />
        <input type="number" id="year" placeholder="Año" />
        <button id="simulateBtn">Simular</button>
      </div>
    </div>

    <button id="backBtn" style="display: none; margin: 10px auto">
      ⬅ Volver a Escuelas
    </button>

    <div id="contentWrapper">
      <div id="shadeData"></div>
      <div id="mapContainer"></div>
    </div>

    <div id="loader" class="hidden">
      <div class="spinner"></div>
      <div class="loaderText">Cargando...</div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
